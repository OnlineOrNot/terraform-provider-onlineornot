name: Sync Upstream API Schemas

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-schemas:
    name: Sync API Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Regenerate schemas and docs
        run: |
          make generate

      - name: Create PR if changed
        run: |
          if git diff --quiet; then
            echo "No changes detected"
            exit 0
          fi

          BRANCH="sync-upstream-schemas"
          
          # Check if PR already exists
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, updating..."
          fi

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create/update branch
          git checkout -B "$BRANCH"
          git add -A
          git commit -m "chore: sync with upstream API schemas"
          git push -f origin "$BRANCH"

          # Create PR if it doesn't exist
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "chore: sync with upstream API schemas" \
              --body "Automated PR to sync generated code with the latest [OnlineOrNot API schemas](https://github.com/OnlineOrNot/api-schemas)."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
